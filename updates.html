<!DOCTYPE html>

    <!-- Bootstrap CSS -->

  <body id="charadex-body">
    <!-- --------------------------------------------------------------------
    <-- Header
    <-------------------------------------------------------------------- -->
    <div class="load-html" id="header" data-source="includes/header.html"></div>
    <div class="container" id="main-container">
      <!-- --------------------------------------------------------------------
      <-- Main List
      <-------------------------------------------------------------------- -->
      <div class="row justify-content-center" style="max-width: 1800px;">
      <!-- --------------------------------------------------------------------
      <-- Sidebar
      <-------------------------------------------------------------------- -->
      <div class="load-html" id="sidebar" data-source="includes/sidebar.html"></div>
        
        <div class="col-md-8 p-0">
          <div class="text-center" style="background-image: url('https://img-l.ink/img/10hNzPgBCCbOplE1uzb0e1RsCWDzlmPHm.jpg'); border-radius: 1rem 1rem 0px 0px !important;">
            <a href="updates.html"><img class="img-fluid p-3 w-50" src="https://img-l.ink/img/1Tlz9FPfMvmnJG__RZrPWwiOi9fFCFxLj.png"></a>
          </div>
          <div class="bg-faded p-1" style="border-radius: 0px 0px 1rem 1rem !important;">
            <div class="row no-gutters">
              <div class="col-12">
                <div class="p-1">
                  <div class="card rounded-0 p-3" style="border-radius: 0px 0px 1rem 1rem !important;">
                    <div class="small">
                      
                    <div class="row no-gutters">
                     <div class="col-12">
                        <div class="p-1">
                           <div class="rounded-0" style="border-radius: 0px 0px 1rem 1rem !important;">
                              <!-- Logs
                              <!-- ----------------------------------------------------------- -->
                              <div id="logs">
                                 <div id="log-gallery">
                                    <!-- List -->
                                    <!-- --------------------------------------------------------------- -->
                                    <div class="log-list"></div>
                                    <!-- List Item -->
                                    <!-- --------------------------------------------------------------- -->
                                    <div style="display: none;">
                                       <div class="row no-gutters mb-1" id="log-gallery-item">
                                          <div class="col-3 col-md-2"><b><span class="timestamp"></span></b></div>
                                          <div class="col-9 col-md-9"><span class="reason"></span></div>
                                       </div>
                                    </div>
                                    <!-- Pagination
                                    <!-- --------------------------------------------------------------- -->
                                    <div style="display: none;" class="log-pagination-container">
                                       <hr>
                                       <div class="nav d-flex justify-content-center mb-n2">
                                          <div class="btn-prev page-item"><a class="page-link"><i class="fa fa-chevron-left"></i></a></div>
                                          <ul class="pagination log-pagination log-pagination-top justify-content-center m-0"></ul>
                                          <div class="btn-next page-item"><a class="page-link"><i class="fa fa-chevron-right"></i></a></div>
                                       </div>
                                    </div>
                                 </div>
                              </div>
                           </div>
                        </div>
                     </div>
                  </div>
                      
                    </div>
                  </div>
                </div>
